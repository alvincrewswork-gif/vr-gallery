function makeLabel(p) {
  const canvas = document.createElement('canvas');
  canvas.width = 1024;
  canvas.height = 256;

  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#f8f1dc';
  ctx.fillRect(0, 0, 1024, 256);
  ctx.strokeStyle = '#8b6914';
  ctx.lineWidth = 6;
  ctx.strokeRect(3, 3, 1018, 250);

  ctx.fillStyle = '#111111';
  ctx.font = 'bold 40px Georgia,serif';
  ctx.fillText(p.title, 28, 54);

  ctx.fillStyle = '#3b2a10';
  ctx.font = '30px Georgia,serif';
  ctx.fillText(p.artist + '  ·  ' + p.year, 28, 94);

  ctx.fillStyle = '#222222';
  ctx.font = '24px Arial,sans-serif';

  const words = p.description.split(' ');
  let line = '';
  let y = 134;
  const maxWidth = 960;
  const lineHeight = 30;

  for (const word of words) {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > maxWidth && line !== '') {
      ctx.fillText(line.trim(), 28, y);
      line = word + ' ';
      y += lineHeight;
      if (y > 228) {
        ctx.fillText('...', 28, y);
        break;
      }
    } else {
      line = test;
    }
  }

  if (y <= 228) ctx.fillText(line.trim(), 28, y);

  const texture = new THREE.CanvasTexture(canvas);
  texture.encoding = THREE.sRGBEncoding;
  return texture;
}

function addCylinderBetween(group, start, end, radius, material) {
  const direction = new THREE.Vector3().subVectors(end, start);
  const length = direction.length();
  const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
  const cylinder = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, length, 18), material);
  cylinder.position.copy(midpoint);
  cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction.clone().normalize());
  group.add(cylinder);
  return cylinder;
}

function createSculptureStudy(item) {
  const material = item.material === 'bronze' ? bronzeMat : marbleMat;
  if (item.key === 'ancient-vase') return createVaseStudy(material);
  if (item.key === 'celestial-globe') return createGlobeStudy(material);
  if (item.key === 'architectural-column') return createColumnStudy(material);
  if (item.key === 'abstract-horse') return createHorseStudy(material);

function addRealModelExhibit(item) {
  const group = new THREE.Group();
  group.position.set(item.position.x, 0, item.position.z);

  addPedestalBase(group);

  const label = new THREE.Mesh(
    new THREE.PlaneGeometry(1.15, 0.38),
    new THREE.MeshStandardMaterial({ map: makeSculpturePlaque(item), roughness: 0.8 })
  );

  if (item.front === 'negativeZ') {
    label.position.set(0, 0.58, -0.66);
    label.rotation.y = Math.PI;
  } else {
    label.position.set(0, 0.58, 0.66);
    label.rotation.y = 0;
  }
  group.add(label);

  const loadingMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.75, transparent: true, opacity: 0.38 });
  const loadingMarker = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.9, 0.42), loadingMat);
  loadingMarker.position.y = 1.45;
  group.add(loadingMarker);

  const spot = new THREE.SpotLight(0xfff8e0, 2.3, 6, Math.PI / 7, 0.25);
  spot.position.set(0, 3.15, item.front === 'negativeZ' ? -0.65 : 0.65);
  spot.target.position.set(0, 1.45, 0);
  group.add(spot);
  group.add(spot.target);

  scene.add(group);

  if (!THREE.GLTFLoader) {
    loadingMarker.material.color.set(0xaa2222);
    console.warn('GLTFLoader is not available. Cannot load:', item.model);
    setStatus('GLTFLoader missing. Real model could not load.');
    return;
  }

  gltfLoader.load(
    item.model,
    (gltf) => {
      group.remove(loadingMarker);
      loadingMarker.geometry.dispose();
      loadingMarker.material.dispose();

      const model = gltf.scene;
      model.updateMatrixWorld(true);

      model.traverse((child) => {
        if (child.isMesh) {
          child.frustumCulled = false;
          if (child.material) {
            if (Array.isArray(child.material)) {
              child.material.forEach(m => { m.side = THREE.DoubleSide; m.needsUpdate = true; });
            } else {
              child.material.side = THREE.DoubleSide;
              child.material.needsUpdate = true;
            }
          }
        }
      });

      const box = new THREE.Box3().setFromObject(model);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      const height = size.y || Math.max(size.x, size.z, 1);
      const scale = item.displayHeight / height;

      const modelHolder = new THREE.Group();
      modelHolder.position.y = 1.02;
      modelHolder.rotation.y = item.rotationY || 0;

      model.scale.setScalar(scale);
      model.position.set(-center.x * scale, -box.min.y * scale, -center.z * scale);

      modelHolder.add(model);

      const displaySize = size.clone().multiplyScalar(scale);
      const grabWidth = Math.max(displaySize.x, 0.45);
      const grabHeight = Math.max(item.displayHeight, 0.35);
      const grabDepth = Math.max(displaySize.z, 0.45);
      const grabHitBox = new THREE.Mesh(
        new THREE.BoxGeometry(grabWidth, grabHeight, grabDepth),
        new THREE.MeshBasicMaterial({ transparent: true, opacity: 0.0, depthWrite: false })
      );
      grabHitBox.position.set(0, grabHeight / 2, 0);
      grabHitBox.userData.type = 'grabbableObject';
      grabHitBox.userData.grabTarget = modelHolder;
      grabHitBox.userData.item = item;
      modelHolder.userData.item = item;
      modelHolder.add(grabHitBox);
      grabbableObjects.push(grabHitBox);

      group.add(modelHolder);

      setStatus('Real objects loaded. Left stick: walk | Right stick: turn | A: teleport | Grip: inspect objects');
    },
    undefined,
    (error) => {
      loadingMarker.material.color.set(0xaa2222);
      loadingMarker.material.opacity = 0.7;
      loadingMarker.material.needsUpdate = true;
      console.warn('Real GLB model failed to load:', item.model, error);
      setStatus('Real model failed to load. Check ' + item.model);
    }
  );
}

let currentNarration = null;

function playNarration(p) {
  if (!p.audio) {
    setStatus('No audio file assigned for: ' + p.title);
    console.warn('No audio file assigned for:', p.title);
    return;
  }

  if (currentNarration) {
    currentNarration.pause();
    currentNarration.currentTime = 0;
    currentNarration = null;
  }

  setStatus('Loading audio: ' + p.title);

  const audio = new Audio(p.audio);
  audio.preload = 'auto';
  audio.volume = 0.65;
  currentNarration = audio;

  audio.addEventListener('playing', () => {
    setStatus('Playing audio: ' + p.title);
  });

  audio.addEventListener('ended', () => {
    if (currentNarration === audio) {
      currentNarration = null;
    }
    setStatus('Audio finished: ' + p.title);
  });

  audio.addEventListener('error', () => {
    const code = audio.error ? audio.error.code : 'unknown';
    setStatus('Audio file failed: ' + p.title);
    console.warn('Audio file failed:', p.audio, code, audio.error);
  });

  const playPromise = audio.play();
  if (playPromise && typeof playPromise.catch === 'function') {
    playPromise.catch((err) => {
      setStatus('Audio blocked/failed: ' + err.message);
      console.warn('Audio play() failed:', p.audio, err);
    });
  }
}

function flashAudioButton(buttonMesh) {
  if (!buttonMesh || !buttonMesh.material) return;
  buttonMesh.material.color.set(0x2ecc71);
  buttonMesh.material.needsUpdate = true;

  setTimeout(() => {
    buttonMesh.material.color.set(0xffffff);
    buttonMesh.material.needsUpdate = true;
  }, 300);
}

function buildFrame(p, pos) {
  const pw = 1.6;
  const ph = pw / p.aspect;
  const ft = 0.06;
  const fd = 0.05;

  const group = new THREE.Group();
  group.position.set(pos.x, pos.y, pos.z);
  group.rotation.y = pos.ry;

  // Gold frame pieces
  [
    [0, (ph + ft) / 2, pw + ft * 2, ft],
    [0, -(ph + ft) / 2, pw + ft * 2, ft],
    [(pw + ft) / 2, 0, ft, ph],
    [-(pw + ft) / 2, 0, ft, ph]
  ].forEach(([fx, fy, fw, fh]) => {
    const piece = new THREE.Mesh(new THREE.BoxGeometry(fw, fh, fd), frameMat);
    piece.position.set(fx, fy, 0);
    group.add(piece);
  });

  // Painting surface. It starts blue; if the image loads, the image replaces the blue.
  // If the image path is wrong, it turns red so we know the problem is a missing file.
  const canvasMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(pw, ph),
    new THREE.MeshStandardMaterial({ color: 0x223344, roughness: 0.9 })
  );
  canvasMesh.position.z = fd / 2 + 0.001;
  group.add(canvasMesh);

  loader.load(
    p.image,
    (tex) => {
      tex.encoding = THREE.sRGBEncoding;
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;
      tex.needsUpdate = true;

      canvasMesh.material.dispose();
      canvasMesh.material = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.8 });
      canvasMesh.material.needsUpdate = true;
    },
    undefined,
    (error) => {
      console.warn('Image load failed:', p.title, p.image, error);
      canvasMesh.material.color.set(0x552222);
      canvasMesh.material.needsUpdate = true;
    }
  );

  // Label plate under the painting
  const labelMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(1.9, 0.5),
    new THREE.MeshStandardMaterial({ map: makeLabel(p), roughness: 0.9 })
  );
  labelMesh.position.set(0, -(ph / 2 + 0.34), fd / 2 + 0.002);
  group.add(labelMesh);

  // Audio button below the plaque
  const audioButtonMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(0.9, 0.28),
    new THREE.MeshStandardMaterial({ map: makeAudioButtonTexture(), color: 0xffffff, roughness: 0.8 })
  );
  audioButtonMesh.position.set(0, -(ph / 2 + 0.74), fd / 2 + 0.003);
  audioButtonMesh.userData.type = 'audioButton';
  audioButtonMesh.userData.painting = p;
  group.add(audioButtonMesh);

  // Invisible larger hit box so the controller ray is easier to aim.
  const audioHitBox = new THREE.Mesh(
    new THREE.PlaneGeometry(1.15, 0.42),
    new THREE.MeshBasicMaterial({ transparent: true, opacity: 0.0, side: THREE.DoubleSide })
  );
  audioHitBox.position.copy(audioButtonMesh.position);
  audioHitBox.position.z += 0.004;
  audioHitBox.userData.type = 'audioButton';
  audioHitBox.userData.painting = p;
  audioHitBox.userData.visualButton = audioButtonMesh;
  audioButtons.push(audioHitBox);
  group.add(audioHitBox);

  // Small spotlight for each painting
  const spot = new THREE.SpotLight(0xfff8e0, 2.5, 5, Math.PI / 8, 0.3);
  spot.position.set(0, 2.2, 0.4);
  spot.target.position.set(0, 0, -0.3);
  group.add(spot);
  group.add(spot.target);

  scene.add(group);
}

function loadGallery() {
  for (let i = 0; i < PAINTINGS.length && i < layout.length; i++) {
    buildFrame(PAINTINGS[i], layout[i]);
  }
}

const interactionRaycaster = new THREE.Raycaster();
const interactionMatrix = new THREE.Matrix4();
const grabRaycaster = new THREE.Raycaster();
const grabMatrix = new THREE.Matrix4();

function onControllerSelect(event) {
  const controller = event.target;
  interactionMatrix.identity().extractRotation(controller.matrixWorld);
  interactionRaycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
  interactionRaycaster.ray.direction.set(0, 0, -1).applyMatrix4(interactionMatrix);

  const hits = interactionRaycaster.intersectObjects(audioButtons, false);
  if (hits.length > 0) {
    const hitMesh = hits[0].object;
    const buttonMesh = hitMesh.userData.visualButton || hitMesh;
    const painting = hitMesh.userData.painting;
    flashAudioButton(buttonMesh);
    playNarration(painting);
  }
}

function onGrabStart(event) {
  if (activeGrab) return;

  const controller = event.target;
  grabMatrix.identity().extractRotation(controller.matrixWorld);
  grabRaycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
  grabRaycaster.ray.direction.set(0, 0, -1).applyMatrix4(grabMatrix);

  const hits = grabRaycaster.intersectObjects(grabbableObjects, false);
  if (!hits.length) {
    setStatus('Grip: aim the controller ray at a 3D object to inspect it.');
    return;
  }

  const hitMesh = hits[0].object;
  const holder = hitMesh.userData.grabTarget;
  const item = hitMesh.userData.item || (holder && holder.userData.item) || { title: 'Object' };
  if (!holder || !holder.parent) return;

  activeGrab = {
    controller,
    holder,
    item,
    originalParent: holder.parent,
    originalPosition: holder.position.clone(),
    originalQuaternion: holder.quaternion.clone(),
    originalScale: holder.scale.clone(),
    scaleMultiplier: 1.0
  };

  controller.attach(holder);
  holder.position.set(0, -0.08, -0.55);
  holder.rotation.set(0, 0, 0);
  holder.scale.copy(activeGrab.originalScale);

  setStatus('Inspecting: ' + item.title + ' | Thumbstick up/down scales | Release grip to return');
}

function restoreGrabbedObject() {
  if (!activeGrab) return;

  const grabbed = activeGrab;
  grabbed.originalParent.add(grabbed.holder);
  grabbed.holder.position.copy(grabbed.originalPosition);
  grabbed.holder.quaternion.copy(grabbed.originalQuaternion);
  grabbed.holder.scale.copy(grabbed.originalScale);
  activeGrab = null;

  setStatus('Returned: ' + grabbed.item.title);
  setTimeout(() => {
    setStatus('VR Art Gallery — Left stick: walk | Right stick: turn | A: teleport | Grip: inspect objects');
  }, 1200);
}

function onGrabEnd(event) {
  if (activeGrab && activeGrab.controller === event.target) {
    restoreGrabbedObject();
  }
}

function updateActiveGrabScale() {
  if (!activeGrab) return;

  let gamepad = activeGrab.controller.userData.gamepad;
  if (!gamepad) {
    const session = renderer.xr.getSession();
    if (session) {
      for (const source of session.inputSources) {
        if (source.handedness === activeGrab.controller.userData.handedness && source.gamepad) {
          gamepad = source.gamepad;
          break;
        }
      }
    }
  }
  if (!gamepad) return;

  const axes = gamepad.axes || [];
  const yAxis = axes[3] !== undefined ? axes[3] : (axes[1] || 0);
  const dead = 0.18;

  if (Math.abs(yAxis) > dead) {
    activeGrab.scaleMultiplier += (-yAxis) * 0.025;
    activeGrab.scaleMultiplier = Math.max(0.45, Math.min(2.25, activeGrab.scaleMultiplier));
    activeGrab.holder.scale.copy(activeGrab.originalScale).multiplyScalar(activeGrab.scaleMultiplier);
    setStatus('Inspecting: ' + activeGrab.item.title + ' | Scale ' + Math.round(activeGrab.scaleMultiplier * 100) + '% | Release grip to return');
  }
}

function getRightController() {
  return controllers.find(c => c.userData.handedness === 'right') || controllers[1];
}

function clampToGalleryBounds(position) {
  position.x = Math.max(-8.5, Math.min(8.5, position.x));
  position.z = Math.max(-5.5, Math.min(5.5, position.z));
  return position;
}

function updateTeleportTarget() {
  teleportTargetValid = false;
  teleportRing.visible = false;

  const rightController = getRightController();
  if (!rightController) return;

  teleportMatrix.identity().extractRotation(rightController.matrixWorld);
  teleportRaycaster.ray.origin.setFromMatrixPosition(rightController.matrixWorld);
  teleportRaycaster.ray.direction.set(0, 0, -1).applyMatrix4(teleportMatrix);

  const hits = teleportRaycaster.intersectObject(floor, false);
  if (!hits.length) return;

  const hit = hits[0].point;
  const x = Math.max(-8.5, Math.min(8.5, hit.x));
  const z = Math.max(-5.5, Math.min(5.5, hit.z));

  teleportTarget.set(x, 0, z);
  teleportRing.position.set(x, 0.025, z);
  teleportRingMat.color.setHex(teleportButtonIndex === null ? 0xffcc33 : 0x66ff99);
  teleportRing.visible = true;
  teleportTargetValid = true;
}

function doTeleport() {
  if (!teleportTargetValid) return;

  player.position.x = teleportTarget.x;
  player.position.z = teleportTarget.z;
  player.position.y = 0;
  setStatus('Teleported. Left stick: walk | Right stick: turn | A: teleport');

  setTimeout(() => {
    setStatus('VR Art Gallery — Left stick: walk | Right stick: turn | A: teleport | Grip: inspect objects');
  }, 1200);
}

function updateTeleportButtonLearning(rightSource) {
  if (!rightSource || !rightSource.gamepad) {
    previousRightButtonPressed = [];
    lastTeleportButtonPressed = false;
    return {
      pressedIndices: [],
      teleportPressed: false,
      rightButtonsCount: 0
    };
  }

  const buttons = rightSource.gamepad.buttons || [];
  const pressedIndices = [];
  let newlyPressedIndex = null;

  for (let i = 0; i < buttons.length; i++) {
    const button = buttons[i];
    const pressed = !!(button && button.pressed);
    const wasPressed = !!previousRightButtonPressed[i];

    if (pressed) pressedIndices.push(i);

    // A/B style face buttons usually appear after the standard trigger,
    // squeeze, touchpad, and thumbstick slots. Learn the first newly pressed
    // right-hand button at index 4 or above.
    if (pressed && !wasPressed && newlyPressedIndex === null && i >= 4) {
      newlyPressedIndex = i;
    }
  }

  if (teleportButtonIndex === null && newlyPressedIndex !== null) {
    teleportButtonIndex = newlyPressedIndex;
    setStatus('Teleport button learned: button ' + teleportButtonIndex);
  }

  const teleportButton = teleportButtonIndex === null ? null : buttons[teleportButtonIndex];
  const teleportPressed = !!(teleportButton && teleportButton.pressed);

  previousRightButtonPressed = buttons.map(button => !!(button && button.pressed));

  return {
    pressedIndices,
    teleportPressed,
    rightButtonsCount: buttons.length
  };
}

function updateTeleportHud(rightSource, buttonState) {
  if (!renderer.xr.isPresenting) {
    hideDebugPanel();
    return;
  }

  // Keep the gallery clean once the teleport button has been learned.
  // The debug panel only appears when a session still needs to learn the A-button index.
  if (teleportButtonIndex !== null) {
    hideDebugPanel();
    return;
  }

  const pressedText = buttonState.pressedIndices.length ? buttonState.pressedIndices.join(', ') : 'none';

  updateDebugPanel([
    'Teleport Setup',
    teleportTargetValid ? 'Floor target: YES' : 'Floor target: NO - aim ray at floor',
    'Right buttons pressed: ' + pressedText,
    'Press A once to learn teleport',
    'Button count: ' + (rightSource && rightSource.gamepad ? buttonState.rightButtonsCount : 'no right gamepad')
  ]);
}


const tempMatrix = new THREE.Matrix4();
const moveDir = new THREE.Vector3();
let lastSnap = 0;

renderer.setAnimationLoop(() => {
  const session = renderer.xr.getSession();

  if (session && renderer.xr.isPresenting) {
    for (const source of session.inputSources) {
      if (!source.gamepad) continue;

      const axes = source.gamepad.axes;
      const lx = axes[2] !== undefined ? axes[2] : (axes[0] || 0);
      const ly = axes[3] !== undefined ? axes[3] : (axes[1] || 0);
      const dead = 0.15;

      // Left thumbstick: walk forward/back and strafe
      if (source.handedness === 'left' && (Math.abs(lx) > dead || Math.abs(ly) > dead)) {
        tempMatrix.identity().extractRotation(camera.matrixWorld);
        moveDir.set(lx * 0.04, 0, ly * 0.04).applyMatrix4(tempMatrix);
        moveDir.y = 0;
        player.position.add(moveDir);

        // Keep player inside gallery walls
        clampToGalleryBounds(player.position);
      }

      // Right thumbstick: snap turn 30 degrees
      if (source.handedness === 'right') {
        const now = Date.now();
        if (Math.abs(lx) > 0.7 && now - lastSnap > 400) {
          player.rotation.y -= Math.sign(lx) * (Math.PI / 6);
          lastSnap = now;
        }
      }
    }

    updateActiveGrabScale();

    if (activeGrab) {
      // While inspecting an object, hide teleport to avoid accidental movement.
      teleportTargetValid = false;
      teleportRing.visible = false;
      hideDebugPanel();
      lastTeleportButtonPressed = false;
    } else {
      updateTeleportTarget();

      let rightSource = null;
      for (const source of session.inputSources) {
        if (source.handedness === 'right' && source.gamepad) {
          rightSource = source;
          break;
        }
      }

      const buttonState = updateTeleportButtonLearning(rightSource);
      updateTeleportHud(rightSource, buttonState);

      if (buttonState.teleportPressed && !lastTeleportButtonPressed) {
        doTeleport();
      }
      lastTeleportButtonPressed = buttonState.teleportPressed;
    }
  } else {
    if (activeGrab) restoreGrabbedObject();
    teleportTargetValid = false;
    teleportRing.visible = false;
    hideDebugPanel();
    previousRightButtonPressed = [];
    lastTeleportButtonPressed = false;
  }

  renderer.render(scene, camera);
});

// ── VR BUTTON ──────────────────────────────────────────────────────────────
const vrBtn = document.getElementById('vr-button');
let xrSession = null;

async function onVRClick() {
  if (xrSession) {
    xrSession.end();
    return;
  }

  try {
    const session = await navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['local-floor', 'bounded-floor']
    });

    xrSession = session;
    session.addEventListener('end', () => {
      if (activeGrab) restoreGrabbedObject();
      xrSession = null;
      vrBtn.textContent = 'Enter VR';
    });

    await renderer.xr.setSession(session);
    vrBtn.textContent = 'Exit VR';
  } catch (e) {
    vrBtn.textContent = 'VR failed: ' + e.message;
  }
}

if (navigator.xr) {
  navigator.xr.isSessionSupported('immersive-vr').then(supported => {
    if (supported) {
      vrBtn.disabled = false;
      vrBtn.textContent = 'Enter VR';
      vrBtn.addEventListener('click', onVRClick);
    } else {
      vrBtn.textContent = 'VR not supported on this browser';
    }
  });
} else {
  vrBtn.textContent = 'WebXR not available';
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
