<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VR Art Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: sans-serif; }
  #vr-button {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    padding: 14px 32px; font-size: 16px; background: #1a1a2e; color: white;
    border: 2px solid #e0c080; border-radius: 8px; z-index: 10; cursor: pointer; letter-spacing: 1px;
  }
  #vr-button:disabled { background: #333; color: #666; border-color: #444; }
  #info {
    position: absolute; top: 16px; width: 100%; text-align: center;
    color: #e0c080; font-size: 13px; z-index: 10; pointer-events: none;
  }
  #loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #e0c080; font-size: 18px; z-index: 20;
  }
</style>
</head>
<body>
<div id="info">VR Art Gallery — Left stick: walk  |  Right stick: turn</div>
<div id="loading">Loading gallery...</div>
<button id="vr-button" disabled>Checking VR support...</button>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Art Institute of Chicago artwork IDs with metadata
// These are all confirmed public domain works in their collection
const ARTWORK_IDS = [
  { id: 27992,  title: "A Sunday on La Grande Jatte",     artist: "Georges Seurat",       year: "1884-86",    description: "Seurat's monumental pointillist masterpiece depicts Parisians relaxing on an island in the Seine. Each dot of pure color blends in the viewer's eye, a technique Seurat called Chromoluminarism.", aspect: 1.39 },
  { id: 16568,  title: "Water Lilies",                    artist: "Claude Monet",         year: "1906",       description: "Part of Monet's famous series painted in his garden at Giverny. The shimmering purples, blues, and greens capture the fleeting effects of light on water's surface.", aspect: 1.04 },
  { id: 28560,  title: "The Bedroom",                     artist: "Vincent van Gogh",     year: "1889",       description: "Van Gogh painted three versions of his bedroom in Arles. The bold colors and distorted perspective convey a sense of rest and peace — a sanctuary from his troubled life.", aspect: 1.26 },
  { id: 14598,  title: "A Sunday on La Grande Jatte (Study)", artist: "Georges Seurat",  year: "1884",       description: "The preparatory oil sketch for Seurat's grande jatte, showing his early exploration of the composition before the final monumental canvas.", aspect: 1.57 },
  { id: 20684,  title: "Stacks of Wheat (End of Summer)", artist: "Claude Monet",         year: "1890-91",    description: "One of Monet's famous haystack series, capturing the same subject at different times of day and seasons. This work helped inspire the Abstract Expressionists.", aspect: 1.28 },
  { id: 111628, title: "The Old Guitarist",               artist: "Pablo Picasso",        year: "1903-04",    description: "Painted during Picasso's Blue Period, this haunting image of a blind, emaciated musician reflects the artist's personal struggles and empathy for society's outcasts.", aspect: 0.55 },
  { id: 9512,   title: "American Gothic",                 artist: "Grant Wood",           year: "1930",       description: "One of the most recognizable images in American art. Wood used his dentist and sister as models for this iconic portrayal of rural Midwestern values and stoicism.", aspect: 0.81 },
  { id: 151363, title: "Nighthawks",                      artist: "Edward Hopper",        year: "1942",       description: "Hopper's most famous work depicts solitary figures in a late-night diner bathed in artificial light. The painting captures the isolation and loneliness of modern urban life.", aspect: 2.0 },
];

// ── SCENE ──────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1008);
scene.fog = new THREE.Fog(0x1a1008, 10, 22);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 50);
camera.position.set(0, 1.6, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

// ── LIGHTING ───────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xfff5e0, 0.5));
[-6, -2, 2, 6].forEach(x => {
  const pt = new THREE.PointLight(0xfff5cc, 1.0, 9);
  pt.position.set(x, 3.2, -1);
  scene.add(pt);
});

// ── ROOM ───────────────────────────────────────────────────────────────────
const wallMat    = new THREE.MeshStandardMaterial({ color: 0xf5f0e8 });
const floorMat   = new THREE.MeshStandardMaterial({ color: 0x5c4a2a, roughness: 0.9 });
const ceilingMat = new THREE.MeshStandardMaterial({ color: 0xede8d8 });
const trimMat    = new THREE.MeshStandardMaterial({ color: 0xc8b890 });

const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 14), floorMat);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(20, 14), ceilingMat);
ceiling.rotation.x = Math.PI / 2;
ceiling.position.y = 4;
scene.add(ceiling);

[
  [0, 2, -7, 0, 20],
  [0, 2, 7, Math.PI, 20],
  [-10, 2, 0, Math.PI/2, 14],
  [10, 2, 0, -Math.PI/2, 14]
].forEach(([x,y,z,ry,w]) => {
  const wall = new THREE.Mesh(new THREE.PlaneGeometry(w, 4), wallMat);
  wall.position.set(x, y, z);
  wall.rotation.y = ry;
  scene.add(wall);
});

function addTrim(x, y, z, w, h, ry) {
  const t = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.05), trimMat);
  t.position.set(x, y, z); t.rotation.y = ry || 0; scene.add(t);
}
addTrim(0,0.1,-6.97,20,0.2,0);     addTrim(0,0.1,6.97,20,0.2,Math.PI);
addTrim(-9.97,0.1,0,14,0.2,Math.PI/2); addTrim(9.97,0.1,0,14,0.2,-Math.PI/2);
addTrim(0,3.9,-6.97,20,0.15,0);    addTrim(0,3.9,6.97,20,0.15,Math.PI);
addTrim(-9.97,3.9,0,14,0.15,Math.PI/2); addTrim(9.97,3.9,0,14,0.15,-Math.PI/2);

// ── PAINTING LAYOUT ────────────────────────────────────────────────────────
const layout = [
  { x:-7,    y:2.0, z:-6.9, ry:0          },
  { x:-3.5,  y:2.0, z:-6.9, ry:0          },
  { x:0,     y:2.0, z:-6.9, ry:0          },
  { x:3.5,   y:2.0, z:-6.9, ry:0          },
  { x:7,     y:2.0, z:-6.9, ry:0          },
  { x:-9.85, y:2.0, z:-2,   ry:Math.PI/2  },
  { x:-9.85, y:2.0, z:2,    ry:Math.PI/2  },
  { x:9.85,  y:2.0, z:0,    ry:-Math.PI/2 },
];

const frameMat = new THREE.MeshStandardMaterial({ color:0x8b6914, roughness:0.4, metalness:0.3 });
const loader   = new THREE.TextureLoader();

function makeLabel(data) {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#1a1008'; ctx.fillRect(0,0,512,128);
  ctx.fillStyle = '#e0c080'; ctx.font = 'bold 20px Georgia,serif';
  ctx.fillText(data.title, 16, 28);
  ctx.fillStyle = '#c8a060'; ctx.font = '16px Georgia,serif';
  ctx.fillText(data.artist + '  ·  ' + data.year, 16, 52);
  ctx.fillStyle = '#a08858'; ctx.font = '13px Arial,sans-serif';
  const words = data.description.split(' ');
  let line = '', y = 74;
  for (const word of words) {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > 490 && line !== '') {
      ctx.fillText(line.trim(), 16, y); line = word + ' '; y += 17;
      if (y > 118) { ctx.fillText('...', 16, y); break; }
    } else { line = test; }
  }
  if (y <= 118) ctx.fillText(line.trim(), 16, y);
  return new THREE.CanvasTexture(canvas);
}

function buildFrame(data, pos, imageUrl) {
  const pw = 1.6;
  const ph = pw / data.aspect;
  const ft = 0.06, fd = 0.05;

  const group = new THREE.Group();
  group.position.set(pos.x, pos.y, pos.z);
  group.rotation.y = pos.ry;

  [[0,(ph+ft)/2,pw+ft*2,ft],[0,-(ph+ft)/2,pw+ft*2,ft],
   [(pw+ft)/2,0,ft,ph],[-(pw+ft)/2,0,ft,ph]].forEach(([fx,fy,fw,fh]) => {
    const piece = new THREE.Mesh(new THREE.BoxGeometry(fw,fh,fd), frameMat);
    piece.position.set(fx,fy,0); group.add(piece);
  });

  const canvasMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(pw, ph),
    new THREE.MeshStandardMaterial({ color: 0x223344, roughness: 0.9 })
  );
  canvasMesh.position.z = fd/2 + 0.001;
  group.add(canvasMesh);

  loader.load(imageUrl,
    (tex) => {
      tex.encoding = THREE.sRGBEncoding;
      canvasMesh.material = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.8 });
      canvasMesh.material.needsUpdate = true;
    },
    undefined,
    () => { console.warn('Image load failed for:', data.title); }
  );

  const labelMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(1.6, 0.4),
    new THREE.MeshStandardMaterial({ map: makeLabel(data), roughness: 0.9 })
  );
  labelMesh.position.set(0, -(ph/2 + 0.28), fd/2 + 0.002);
  group.add(labelMesh);

  const spot = new THREE.SpotLight(0xfff8e0, 2.5, 5, Math.PI/8, 0.3);
  spot.position.set(0, 2.2, 0.4);
  spot.target.position.set(0, 0, -0.3);
  group.add(spot); group.add(spot.target);
  scene.add(group);
}

// ── LOAD FROM ART INSTITUTE API ────────────────────────────────────────────
async function loadGallery() {
  const ids = ARTWORK_IDS.map(a => a.id).join(',');
  const url = `https://api.artic.edu/api/v1/artworks?ids=${ids}&fields=id,image_id`;

  let imageMap = {};
  try {
    const res = await fetch(url);
    const json = await res.json();
    const iiifBase = json.config.iiif_url;
    json.data.forEach(item => {
      if (item.image_id) {
        imageMap[item.id] = `${iiifBase}/${item.image_id}/full/843,/0/default.jpg`;
      }
    });
  } catch(e) {
    console.warn('API fetch failed, using placeholders:', e);
  }

  ARTWORK_IDS.forEach((data, i) => {
    if (i >= layout.length) return;
    const imageUrl = imageMap[data.id] || '';
    buildFrame(data, layout[i], imageUrl);
  });

  document.getElementById('loading').style.display = 'none';
}

loadGallery();

// ── PLAYER + CONTROLLERS ───────────────────────────────────────────────────
const player = new THREE.Group();
player.add(camera);
player.position.set(0, 0, 4);
scene.add(player);

[0, 1].forEach(i => {
  const ctrl = renderer.xr.getController(i);
  const ray = new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-1)]),
    new THREE.LineBasicMaterial({ color: 0xe0c080, transparent: true, opacity: 0.4 })
  );
  ray.scale.z = 3; ctrl.add(ray); player.add(ctrl);
});

const tempMatrix = new THREE.Matrix4();
const moveDir = new THREE.Vector3();
let lastSnap = 0;

renderer.setAnimationLoop(() => {
  const session = renderer.xr.getSession();
  if (session && renderer.xr.isPresenting) {
    for (const source of session.inputSources) {
      if (!source.gamepad) continue;
      const axes = source.gamepad.axes;
      const lx = axes[2] !== undefined ? axes[2] : (axes[0]||0);
      const ly = axes[3] !== undefined ? axes[3] : (axes[1]||0);
      const dead = 0.15;
      if (source.handedness === 'left' && (Math.abs(lx) > dead || Math.abs(ly) > dead)) {
        tempMatrix.identity().extractRotation(camera.matrixWorld);
        moveDir.set(lx*0.04, 0, ly*0.04).applyMatrix4(tempMatrix);
        moveDir.y = 0;
        player.position.add(moveDir);
        player.position.x = Math.max(-8.5, Math.min(8.5, player.position.x));
        player.position.z = Math.max(-5.5, Math.min(5.5, player.position.z));
      }
      if (source.handedness === 'right') {
        const now = Date.now();
        if (Math.abs(lx) > 0.7 && now - lastSnap > 400) {
          player.rotation.y -= Math.sign(lx) * (Math.PI/6);
          lastSnap = now;
        }
      }
    }
  }
  renderer.render(scene, camera);
});

// ── VR BUTTON ──────────────────────────────────────────────────────────────
const vrBtn = document.getElementById('vr-button');
let xrSession = null;

async function onVRClick() {
  if (xrSession) { xrSession.end(); return; }
  try {
    const session = await navigator.xr.requestSession('immersive-vr', {
      optionalFeatures: ['local-floor', 'bounded-floor']
    });
    xrSession = session;
    session.addEventListener('end', () => { xrSession = null; vrBtn.textContent = 'Enter VR'; });
    await renderer.xr.setSession(session);
    vrBtn.textContent = 'Exit VR';
  } catch(e) { vrBtn.textContent = 'VR failed: ' + e.message; }
}

if (navigator.xr) {
  navigator.xr.isSessionSupported('immersive-vr').then(supported => {
    if (supported) {
      vrBtn.disabled = false; vrBtn.textContent = 'Enter VR';
      vrBtn.addEventListener('click', onVRClick);
    } else { vrBtn.textContent = 'VR not supported on this browser'; }
  });
} else { vrBtn.textContent = 'WebXR not available'; }

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
